services:
  - type: web
    name: empathic-actions-api
    runtime: php
    plan: free
    buildCommand: |
      composer install --no-dev --optimize-autoloader &&
      php artisan key:generate --force &&
      php artisan config:cache &&
      php artisan route:cache &&
      php artisan view:cache &&
      touch database/database.sqlite &&
      php artisan migrate --force &&
      php artisan db:seed --force &&
      php artisan storage:link
    startCommand: |
      php artisan serve --host=0.0.0.0 --port=$PORT
    envVars:
      - key: APP_KEY
        generateValue: true
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_NAME
        value: "Empathic Actions"
      - key: DB_CONNECTION
        value: sqlite
      - key: SESSION_DRIVER
        value: database
      - key: CACHE_STORE
        value: database
      - key: QUEUE_CONNECTION
        value: database
      - key: LOG_CHANNEL
        value: stack
      - key: LOG_LEVEL
        value: error
      - key: FILESYSTEM_DISK
        value: local